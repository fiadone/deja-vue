name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/deja-vue/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build -w deja-vue
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -w deja-vue